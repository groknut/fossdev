service:
    product-service:
        build: ./product_service
        ports:
            - "8001:8000"
        networks:
            - service-net

    order-service:
        build: ./order_service
        ports:
            - "8002:8000"
        networks:
            - service-net
        environment:
            PRODUCT_SERVICE_URL: http://product-service:8000

        depends_on:
            - product-service

networks:
    service-net:
        driver: bridge
        ipam:
            config:
                subnet: 127.28.10.0/24
